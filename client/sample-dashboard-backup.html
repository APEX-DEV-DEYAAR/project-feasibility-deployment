<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Deyaar CFO Executive Dashboard - Real Estate Development Financial Overview" />
    <meta name="theme-color" content="#3D2914" />
    <meta name="color-scheme" content="light" />
    
    <!-- Deyaar Branding -->
    <title>Deyaar | CFO Executive Dashboard</title>
    
    <!-- 
      DEYAAR BRAND FONTS:
      Primary: Acta Pro (Georgia fallback for serif elegance)
      Secondary: Helvetica Neue (system fonts fallback)
      Arabic: Cairo (loaded from Google Fonts)
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              deyaar: {
                brown: {
                  900: '#3D2914',
                  800: '#4A3320',
                  700: '#5C4028',
                  600: '#6E4D30',
                  500: '#805A38',
                },
                orange: {
                  500: '#D26935',
                  400: '#E07A45',
                  600: '#B85A2B',
                },
                cream: {
                  50: '#FDFBF7',
                  100: '#FAF6ED',
                  200: '#F5ECD9',
                  300: '#E8DCC8',
                  400: '#D4C4AC',
                }
              }
            },
            fontFamily: {
              display: ['Georgia', 'Times New Roman', 'serif'],
              sans: ['Helvetica Neue', 'Arial', 'sans-serif'],
            }
          }
        }
      }
    </script>
    
    <style>
      /* DEYAAR BRAND COLOR PALETTE */
      :root {
        /* Primary Colors */
        --deyaar-brown-900: #3D2914;
        --deyaar-brown-800: #4A3320;
        --deyaar-brown-700: #5C4028;
        --deyaar-brown-600: #6E4D30;
        --deyaar-brown-500: #805A38;
        
        /* Accent - Orange */
        --deyaar-orange-500: #D26935;
        --deyaar-orange-400: #E07A45;
        --deyaar-orange-600: #B85A2B;
        
        /* Background Colors - Cream/Beige */
        --deyaar-cream-50: #FDFBF7;
        --deyaar-cream-100: #FAF6ED;
        --deyaar-cream-200: #F5ECD9;
        --deyaar-cream-300: #E8DCC8;
        --deyaar-cream-400: #D4C4AC;
        
        /* Neutral */
        --deyaar-white: #FFFFFF;
        --deyaar-neutral-50: #F9FAFB;
        --deyaar-neutral-100: #F3F4F6;
        --deyaar-neutral-400: #9CA3AF;
        --deyaar-neutral-500: #6B7280;
        --deyaar-neutral-600: #4B5563;
        --deyaar-neutral-700: #374151;
        --deyaar-neutral-800: #1F2937;
        --deyaar-neutral-900: #111827;
        
        /* Semantic */
        --deyaar-success: #059669;
        --deyaar-warning: #D97706;
        --deyaar-danger: #DC2626;
        --deyaar-info: #2563EB;
      }

      /* Critical CSS for initial load */
      html {
        background: var(--deyaar-cream-100);
        scroll-behavior: smooth;
      }
      
      body {
        margin: 0;
        font-family: 'Helvetica Neue', 'Arial', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: var(--deyaar-cream-100);
        color: var(--deyaar-brown-900);
      }
      
      #root {
        min-height: 100vh;
      }
      
      /* Typography */
      .font-display {
        font-family: Georgia, 'Times New Roman', serif;
        letter-spacing: -0.02em;
      }
      
      /* Loading state with Deyaar branding */
      .initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--deyaar-cream-100);
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      
      .initial-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      
      .initial-loader-content {
        text-align: center;
        padding: 48px;
        background: var(--deyaar-white);
        border-radius: 20px;
        box-shadow: 0 8px 32px rgba(61, 41, 20, 0.12);
        border: 1px solid var(--deyaar-cream-300);
      }
      
      .initial-loader-logo {
        width: 180px;
        height: auto;
        margin-bottom: 32px;
      }
      
      .initial-loader-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid var(--deyaar-cream-300);
        border-top-color: var(--deyaar-orange-500);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }
      
      .initial-loader-text {
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 14px;
        color: var(--deyaar-brown-900);
        letter-spacing: 4px;
        text-transform: uppercase;
        font-weight: 500;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      
      ::-webkit-scrollbar-track {
        background: var(--deyaar-cream-200);
      }
      
      ::-webkit-scrollbar-thumb {
        background: var(--deyaar-cream-400);
        border-radius: 5px;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: var(--deyaar-neutral-400);
      }
      
      /* Selection */
      ::selection {
        background: var(--deyaar-orange-500);
        color: var(--deyaar-white);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Initial loading state - will be replaced by React -->
      <div class="initial-loader" id="initial-loader">
        <div class="initial-loader-content">
          <img 
            src="02%20LOGO%20AGENT%20PACK/DEYAAR%20LOGO/PNG/DEYAAR_LOGO_EN.png" 
            alt="DEYAAR" 
            class="initial-loader-logo"
            onerror="this.src='02%20LOGO%20AGENT%20PACK/LOGOS%20IN%20COLORS/DEYAAR_LOGO_EN_BROWN.png'"
          />
          <div class="initial-loader-spinner"></div>
          <div class="initial-loader-text">Loading Dashboard</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/standalone/sample-dashboard.jsx"></script>
    <script>
      // Hide initial loader when app is ready
      window.addEventListener('load', () => {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          setTimeout(() => {
            loader.classList.add('hidden');
            setTimeout(() => loader.remove(), 400);
          }, 600);
        }
      });
    </script>
  </body>
</html>
